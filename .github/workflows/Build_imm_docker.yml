name: Build_imm_HLK_7628N

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      log_switch:
        description: " ← 单线程编译 默认4线程"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: 'config/hlk7628n.config'
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  DIY_P3_SH: diy-part3.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 拉取 Ubuntu 18.04 镜像
      run: docker pull ubuntu:18.04

    - name: 在 Ubuntu 18.04 容器里编译
      id: compile
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:18.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y \
              git wget curl build-essential libncurses5-dev gawk \
              libssl-dev gettext zlib1g-dev swig unzip python3 python3-pip jq

            cd /workspace

            echo '>>> 克隆源码'
            git clone ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
            cd openwrt
            git log --oneline -1

            echo '>>> 更新 feeds'
            ./scripts/feeds update -a
            ./scripts/feeds install -a -f

            echo '>>> 应用配置'
            cp -fv /workspace/${{ env.CONFIG_FILE }} .config
            make defconfig

            echo '>>> 下载包'
            make download -j8
            find dl -size -1024c -delete

            echo '>>> 编译'
            make -j$(nproc) || make -j4 V=s

            echo '>>> 生成设备名'
            grep '^CONFIG_TARGET.*DEVICE.*=y' .config \
              | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          "

        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "🚀 OpenWrt firmware for HILINK HLK-7628N WIFI路由模块" >> release.txt
        echo "设备: HILINK HLK-7628N WIFI路由模块" >> release.txt
        echo "时间: $(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "源码仓库: ${{ env.REPO_URL }}" >> release.txt
        echo "分支: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "管理地址: 192.168.100.1" >> release.txt
        echo "登录账号: root" >> release.txt
        echo "密码: 无" >> release.txt

    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/**/*
        allowUpdates: true
        draft: false
        prerelease: false
